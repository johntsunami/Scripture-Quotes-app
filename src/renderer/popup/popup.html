<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quote</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="quote" id="quote">
    <div class="quote__body">
      <button class="quote__close" id="quote-close" title="Close (Esc)" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
          <path d="M2 2 L12 12 M12 2 L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        </svg>
      </button>

      <p class="quote__text"   id="quote-text"></p>
      <p class="quote__source" id="quote-source"></p>
    </div>

    <div class="quote__actions" id="quote-actions">
      <button class="btn" data-action="dismiss"  title="Dismiss (Esc)">Dismiss</button>
      <button class="btn btn--gold" data-action="favorite" title="Save to Favorites (F)">
        <span class="btn__icon" id="fav-icon">☆</span>
        <span class="btn__label" id="fav-label">Save</span>
      </button>
      <button class="btn btn--quiet" data-action="delete" title="Delete forever (Shift+Del)">Delete</button>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
